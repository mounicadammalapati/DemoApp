<!--set header as well -->
<mat-toolbar>
  <span>Demo Application</span>
  <span class="spacer"></span>
  <button mat-button> Welcome {{ userName }}</button>
  <button mat-icon-button (click)="logout()"> <!-- log out here -->
    <mat-icon mat-title="logoff"><span class="material-symbols-outlined">
        exit_to_app</span></mat-icon>
  </button>
  </mat-toolbar>
<div class="container">
  <div class="sidebar" [class.collapsed]="isCollapsed">
    <button class="toggle" (click)="isCollapsed = !isCollapsed">
      <mat-icon>menu</mat-icon>
    </button>

    <ul>
      <li routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>dashboard</mat-icon><span>Dashboard</span>
      </li>
      <li (click)="goToNotificationSystem()" [class.active]="isCreditCardRoute()">
        <mat-icon>CreditCard</mat-icon><span>ExpiryNotificationSystem</span>
      </li>
      <li (click)="goToStockApp()" [class.active]="isStockAppRoute()">
        <mat-icon>finance_mode</mat-icon><span>StockApp</span>
      </li>
    </ul>
  </div>

  <div class="main">
    <!-- <mat-toolbar color="primary">Dashboard</mat-toolbar> -->

    <!-- Show dashboard content only if no child route is active -->
    <div *ngIf="!isCreditCardRoute()" class="cards">
      <mat-card style="width: 50%;height: 50%;">
        <mat-card-content>
          <div style="text-align: center;">
            CreditCardNotification System
            <button mat-raised-button color="accent" (click)='goToNotificationSystem()'>let's go</button>
          </div>
        </mat-card-content>
      </mat-card>
        <mat-card style="width: 50%;height: 50%;">
          <mat-card-content>
            <div style="text-align: center;">
              StockApp
              <button mat-raised-button color="accent" (click)='goToStockApp()'>let's go</button>
            </div>
          </mat-card-content>
          </mat-card>
    </div>

    <!-- Router outlet for child routes (creditcardExpiry) -->
    <router-outlet></router-outlet>
  </div>
</div>
