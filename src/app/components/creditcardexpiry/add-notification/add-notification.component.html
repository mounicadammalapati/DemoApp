<mat-card >
    <mat-card-title>Add Credit Card Expiry Notification</mat-card-title>
    <mat-card-content >
        <form [formGroup]="addNotificationGroup">
            <div class="flex-row">
                <div class="flex-column flex-50">
                    <mat-form-field>
                        <mat-label>CardName</mat-label>
                        <input matInput formControlName="cardName">
                    </mat-form-field>
                </div>

            </div>
            <div class="flex-row">
                <div class="flex-column flex-50">
                    <mat-form-field>
                        <mat-label>CardLast4Digits</mat-label>
                        <input matInput formControlName="creditCard4digit">
                    </mat-form-field>
                </div>

            </div>
            <div class="flex-row">
                <div class="flex-column flex-25">
                    <mat-form-field>
                        <mat-select placeholder="Expiry Month" formControlName="expiryMonth">
                            <mat-option *ngFor="let month of expiryMonths" [value]="month">
                                {{month}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>

                </div>
                <div class="flex-column flex-25">
                    <mat-form-field>
                        <mat-select placeholder="Expiry Year" formControlName="expiryYear">
                            <mat-option *ngFor="let year of expiryYears" [value]="year">
                                {{year}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
            </div>
            <div class="flex-row">
                <div class="flex-column flex-20">
                    <mat-form-field>
                        <mat-label>notify</mat-label>
                        <mat-select formControlName="notifyType">
                            <mat-option *ngFor="let notify of notifyBy" [value]="notify">
                                {{notify}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
                <div class="flex-column flex-20" *ngIf="addNotificationGroup.get('notifyType')?.value === 'EMAIL'">
                    <mat-form-field>
                        <mat-label>Email Address</mat-label>
                        <input matInput formControlName="emailAddress" placeholder="Email Address">
                    </mat-form-field>
                </div>
                <div class="flex-column flex-20" *ngIf="addNotificationGroup.get('notifyType')?.value === 'SMS'">
                    <mat-form-field>
                        <mat-label>Phone Number</mat-label>
                        <input matInput formControlName="phoneNumber" placeholder="Phone Number">
                    </mat-form-field>
                </div>
            </div>
            <div class="flex-row">
                <div class="flex-column flex-50">
                    <mat-form-field>
                       <mat-select placeholder="Remainder Days" formControlName="remainderDays" multiple>
                            <mat-option *ngFor="let day of reminderDaysOptions" [value]="day">
                                {{day}}
                            </mat-option>
                        </mat-select>
                    </mat-form-field>
                </div>
            </div>
            <div class="flex-row">
                <div class="flex-column flex-50">
                    <mat-form-field>
                        <mat-label>Notes</mat-label>
                        <input matInput formControlName="notes">
                    </mat-form-field>
                </div>
            </div>

            <div class="flex-gap flex-align-end">
                <button mat-button color="primary">Add Remainder</button>
                <button mat-button (click)="cancelAddNotification()" >Cancel</button>
            </div>
        </form>
    </mat-card-content>

</mat-card>
